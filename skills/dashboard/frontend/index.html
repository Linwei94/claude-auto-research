<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Dark theme (default) ───────────────────────────── */
    :root, [data-theme="dark"] {
      --bg:        #1e1e1e;
      --sidebar:   #252526;
      --surface:   #2d2d30;
      --surface2:  #383838;
      --border:    #3e3e42;
      --text:      #cccccc;
      --text-dim:  #888888;
      --accent:    #007acc;
      --accent-h:  #1a8dd4;
      --green:     #4caf50;
      --orange:    #ff9800;
      --red:       #f44336;
      --blue:      #2196f3;
      --purple:    #9c27b0;
    }

    /* ── Light theme ────────────────────────────────────── */
    [data-theme="light"] {
      --bg:        #f5f5f5;
      --sidebar:   #ffffff;
      --surface:   #ffffff;
      --surface2:  #ebebeb;
      --border:    #d4d4d4;
      --text:      #1e1e1e;
      --text-dim:  #666666;
      --accent:    #0066b8;
      --accent-h:  #005fa3;
      --green:     #2d7d32;
      --orange:    #e65100;
      --red:       #c62828;
      --blue:      #1565c0;
      --purple:    #6a1b9a;
    }

    /* ── Auto: follow system preference ─────────────────── */
    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]):not([data-theme="light"]) {
        --bg:        #f5f5f5;
        --sidebar:   #ffffff;
        --surface:   #ffffff;
        --surface2:  #ebebeb;
        --border:    #d4d4d4;
        --text:      #1e1e1e;
        --text-dim:  #666666;
        --accent:    #0066b8;
        --accent-h:  #005fa3;
        --green:     #2d7d32;
        --orange:    #e65100;
        --red:       #c62828;
        --blue:      #1565c0;
        --purple:    #6a1b9a;
      }
    }

    /* ── Theme toggle button ─────────────────────────────── */
    #theme-toggle {
      font-size: 15px;
      padding: 4px 7px;
      border-radius: 5px;
      cursor: pointer;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      transition: background 0.15s, color 0.15s;
      line-height: 1;
      user-select: none;
    }
    #theme-toggle:hover { background: var(--surface2); color: var(--text); }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────── */
    #sidebar {
      width: 210px;
      min-width: 210px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
    }
    .logo { font-size: 14px; font-weight: 600; letter-spacing: 0.3px; }

    #sse-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: background 0.4s;
      cursor: help;
      flex-shrink: 0;
    }
    #sse-dot.connected   { background: var(--green); }
    #sse-dot.polling     { background: var(--orange); }

    .project-section {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .project-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin-bottom: 4px;
    }
    #project-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }

    nav { flex: 0 0 auto; padding: 8px 0; overflow-y: auto; }
    #nav { flex: 1; overflow-y: auto; min-height: 96px; }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.15s, background 0.15s;
      cursor: pointer;
    }
    .nav-link:hover { background: var(--surface); color: var(--text); }
    .nav-link.active { color: var(--text); background: var(--surface2); border-left: 2px solid var(--accent); }
    .nav-icon { font-size: 14px; }

    #sidebar-stats {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
    }
    .stat-chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }
    .stat-val { font-size: 18px; font-weight: 700; }
    .stat-lbl { font-size: 10px; color: var(--text-dim); margin-top: 1px; }
    .stat-val.running { color: var(--blue); }
    .stat-val.done    { color: var(--green); }
    .stat-val.pending { color: var(--text-dim); }

    /* ── Main ────────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 44px;
      border-bottom: 1px solid var(--border);
      background: var(--sidebar);
      flex-shrink: 0;
    }
    #breadcrumb { font-size: 13px; font-weight: 500; color: var(--text-dim); }

    .topbar-actions { display: flex; align-items: center; gap: 10px; }
    .text-muted { color: var(--text-dim); font-size: 12px; }

    #view-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    /* ── Buttons ─────────────────────────────────────── */
    button, .btn {
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text);
      font-size: 13px;
      padding: 5px 10px;
      border-radius: 4px;
      transition: background 0.15s;
    }
    button:hover, .btn:hover { background: var(--surface2); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      padding: 6px 14px;
      border-radius: 4px;
    }
    .btn-primary:hover { background: var(--accent-h); }

    .btn-sm { padding: 3px 8px; font-size: 12px; }

    /* ── Cards ───────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .card-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.8px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* ── Status badges ───────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-running  { background: rgba(33,150,243,0.2); color: var(--blue); }
    .badge-done     { background: rgba(76,175,80,0.2);  color: var(--green); }
    .badge-pending  { background: rgba(136,136,136,0.15); color: var(--text-dim); }
    .badge-failed   { background: rgba(244,67,54,0.2);  color: var(--red); }
    .badge-on_hold  { background: rgba(255,152,0,0.2);  color: var(--orange); }
    .badge-cancelled{ background: rgba(136,136,136,0.1); color: var(--text-dim); }

    /* ── Nav phase dots ─────────────────────────────── */
    .nav-phase-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      margin-left: auto;
      flex-shrink: 0;
    }
    .nav-phase-dot.current { background: var(--accent); }
    .nav-phase-dot.done    { background: var(--green); opacity: 0.7; }

    /* ── Phase bar ───────────────────────────────────── */
    .phase-bar {
      display: flex;
      gap: 3px;
      align-items: center;
      flex-wrap: nowrap;
      margin-bottom: 8px;
    }
    .phase-dot {
      width: 28px; height: 6px;
      border-radius: 3px;
      background: var(--border);
      flex-shrink: 0;
      cursor: help;
      transition: background 0.2s;
    }
    .phase-dot.complete { background: var(--green); }
    .phase-dot.current  { background: var(--accent); }
    .phase-dot.blocked  { background: var(--orange); }

    /* ── Run card ────────────────────────────────────── */
    .run-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .run-card:hover { border-color: #555; }
    .run-card.running { border-left: 3px solid var(--blue); }
    .run-card.done    { border-left: 3px solid var(--green); }
    .run-card.failed  { border-left: 3px solid var(--red); }

    .run-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
    }
    .run-id {
      font-family: monospace;
      font-size: 12px;
      font-weight: 600;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .run-meta { font-size: 11px; color: var(--text-dim); }
    .run-desc {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 380px;
    }
    .run-metrics { font-size: 12px; font-weight: 600; color: var(--green); }

    .run-body {
      display: none;
      border-top: 1px solid var(--border);
      padding: 14px;
    }
    .run-body.open { display: block; }

    .run-detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 14px;
    }
    .run-kv { display: flex; flex-direction: column; gap: 4px; }
    .run-key { font-size: 10px; color: var(--text-dim); font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
    .run-val { font-size: 12px; font-family: monospace; }

    .chart-wrap { position: relative; height: 180px; }
    .chart-mini-wrap { position: relative; height: 50px; width: 120px; }

    /* ── Results table ───────────────────────────────── */
    .results-controls {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .results-controls label { font-size: 12px; color: var(--text-dim); }
    select {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 12px;
    }

    .results-table-wrap { overflow-x: auto; }
    .results-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .results-table th {
      text-align: left;
      padding: 8px 12px;
      background: var(--surface2);
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .results-table td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .results-table tr:last-child td { border-bottom: none; }
    .results-table tr:hover td { background: rgba(255,255,255,0.03); }

    .method-name { font-weight: 600; }
    .group-tag {
      font-size: 10px;
      color: var(--text-dim);
      margin-left: 4px;
    }
    .cell-val { font-family: monospace; font-size: 13px; }
    .cell-best { color: var(--green); font-weight: 700; }
    .cell-sig::after { content: '*'; color: var(--orange); font-size: 10px; vertical-align: super; }
    .cell-delta { font-size: 11px; color: var(--text-dim); }
    .cell-delta.positive { color: var(--green); }
    .cell-delta.negative { color: var(--red); }
    .cell-empty { color: var(--border); }
    .cell-running { color: var(--blue); animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

    /* ── Experiment design table cell states ──────────── */
    .exp-design-table td { cursor: pointer; transition: background 0.12s; }
    .exp-design-table td:hover { background: rgba(255,255,255,0.05); }
    .cell-todo { color: var(--border); font-size: 15px; }
    .cell-pending { font-size: 15px; }
    .cell-running-exp { color: var(--blue); animation: pulse 1.2s ease-in-out infinite; font-size: 15px; }
    .cell-failed-exp { color: var(--red); font-weight: 700; }

    /* ── GPU view ────────────────────────────────────── */
    .gpu-host { margin-bottom: 14px; }
    .gpu-host-name {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-dim);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .gpu-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      margin-bottom: 6px;
    }
    .gpu-index { font-size: 11px; color: var(--text-dim); width: 40px; flex-shrink: 0; }
    .gpu-name  { font-size: 12px; width: 140px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .gpu-bar-wrap { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .gpu-bar { height: 100%; border-radius: 4px; transition: width 0.3s; background: var(--accent); }
    .gpu-bar.busy { background: var(--blue); }
    .gpu-bar.high { background: var(--orange); }
    .gpu-bar.full { background: var(--red); }
    .gpu-util  { font-size: 11px; width: 36px; text-align: right; flex-shrink: 0; }
    .gpu-mem   { font-size: 11px; color: var(--text-dim); width: 90px; flex-shrink: 0; }
    .gpu-exp   { font-size: 11px; color: var(--blue); font-family: monospace; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .gpu-blacklist { opacity: 0.4; }

    /* ── Overview ────────────────────────────────────── */
    .overview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }
    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px;
      text-align: center;
    }
    .summary-num { font-size: 28px; font-weight: 700; }
    .summary-num.running { color: var(--blue); }
    .summary-num.done    { color: var(--green); }
    .summary-num.pending { color: var(--text-dim); }
    .summary-num.hold    { color: var(--orange); }
    .summary-lbl { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

    .gate-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      margin-bottom: 6px;
    }
    .gate-item.open { border-color: var(--orange); background: rgba(255,152,0,0.06); }
    .gate-icon { font-size: 14px; }
    .gate-title { font-size: 12px; flex: 1; }
    .gate-status { font-size: 11px; color: var(--text-dim); }

    .recent-run {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .recent-run:last-child { border-bottom: none; }

    /* ── Sidebar project list ───────────────────────── */
    .sidebar-project-item {
      display: flex;
      align-items: center;
      padding: 5px 16px;
      cursor: pointer;
      font-size: 12px;
      font-family: monospace;
      color: var(--text-dim);
      transition: background 0.12s, color 0.12s;
      border-left: 2px solid transparent;
    }
    .sidebar-project-item:hover { background: var(--surface); color: var(--text); }
    .sidebar-project-item.active {
      color: var(--text);
      background: var(--surface2);
      border-left-color: var(--accent);
    }
    .proj-phase-badge {
      font-size: 10px;
      font-weight: 600;
      color: var(--accent);
      background: rgba(0,122,204,0.15);
      border-radius: 3px;
      padding: 1px 4px;
      flex-shrink: 0;
      margin-left: 4px;
      font-family: monospace;
      letter-spacing: 0;
    }

    /* ── Sidebar resize handles ─────────────────────── */
    .sb-resize {
      height: 6px;
      background: transparent;
      cursor: ns-resize;
      flex-shrink: 0;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .sb-resize::before {
      content: '· · ·';
      font-size: 8px;
      letter-spacing: 2px;
      color: transparent;
      transition: color 0.15s;
      line-height: 1;
      pointer-events: none;
    }
    .sb-resize::after {
      content: '';
      position: absolute;
      inset: -5px 0;   /* expand hit area */
    }
    .sb-resize:hover::before, .sb-resize.dragging::before {
      color: var(--accent);
    }
    .sb-resize:hover, .sb-resize.dragging {
      background: rgba(0,122,204,0.15);
    }

    /* ── Phase progress section ──────────────────────── */
    #phase-section {
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      padding-bottom: 4px;
    }
    #phase-headline {
      padding: 6px 16px 4px;
    }
    .phase-prog-track {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 16px 6px;
      overflow: hidden;
    }
    .phase-prog-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.5s ease;
    }
    #phase-group-list {
      max-height: 168px;
      overflow-y: auto;
    }
    .phase-group-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 16px 3px 12px;
      font-size: 11px;
      border-left: 2px solid transparent;
      transition: background 0.1s;
    }
    .phase-group-row.complete {
      color: #555;
    }
    .phase-group-row.complete .pg-icon { color: var(--green); }
    .phase-group-row.current {
      color: var(--text);
      background: rgba(0,122,204,0.1);
      border-left-color: var(--accent);
    }
    .phase-group-row.pending { color: #444; }
    .pg-icon { font-size: 11px; width: 14px; text-align: center; flex-shrink: 0; }
    .pg-label { flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .pg-prog { font-size: 9px; color: var(--text-dim); flex-shrink: 0; }

    /* ── Modal ───────────────────────────────────────── */
    #modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
    }
    #modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      width: 400px;
      max-height: 70vh;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    #modal h2 { font-size: 15px; }
    #modal-project-list {
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }
    .modal-project-item {
      padding: 9px 12px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 13px;
      font-family: monospace;
      border: 1px solid transparent;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .modal-project-item:hover { background: var(--surface2); }
    .modal-project-item.selected { border-color: var(--accent); background: rgba(0,122,204,0.1); }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }

    /* ── Misc ────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 13px; }

    .loading { color: var(--text-dim); padding: 40px; text-align: center; }

    .error-box {
      background: rgba(244,67,54,0.1);
      border: 1px solid rgba(244,67,54,0.3);
      border-radius: 5px;
      padding: 10px 14px;
      color: var(--red);
      font-size: 12px;
      margin-bottom: 14px;
    }

    hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

    /* Paper view */
    #pdf-frame {
      width: 100%;
      height: calc(100vh - 90px);
      border: none;
    }
    .pdf-select { margin-bottom: 10px; display: flex; gap: 8px; align-items: center; }

    /* Paper list panel */
    #paper-layout { height: calc(100vh - 44px); }
    .paper-list-item { border-bottom: 1px solid var(--border); }
    .paper-list-item:last-child { border-bottom: none; }

    @media (max-width: 768px) {
      #paper-layout { flex-direction: column !important; height: auto; }
      #paper-list-panel { width: 100% !important; max-width: 100% !important; border-right: none !important; border-bottom: 1px solid var(--border); max-height: 200px; }
      #paper-resize { display: none; }
      #paper-viewer iframe { min-height: 60vh; }
    }

    /* ── Mobile hamburger button ─────────────────────── */
    #menu-toggle {
      display: none;
      font-size: 18px;
      padding: 4px 8px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-dim);
      cursor: pointer;
    }

    /* ── Mobile responsive ───────────────────────────── */
    @media (max-width: 768px) {
      body {
        flex-direction: column;
        overflow: auto;
        height: auto;
      }

      #sidebar {
        width: 100%;
        min-width: unset;
        border-right: none;
        border-bottom: 1px solid var(--border);
        /* Collapsed by default on mobile */
        display: none;
        max-height: 60vh;
        overflow-y: auto;
      }
      #sidebar.mobile-open { display: flex; }

      #main {
        overflow: auto;
        height: auto;
        min-height: 100vh;
      }

      #topbar {
        position: sticky;
        top: 0;
        z-index: 100;
      }

      #menu-toggle { display: block; }

      #view-container {
        overflow-y: visible;
        padding: 12px;
      }

      /* Run card: single column detail grid on mobile */
      .run-detail-grid {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      /* Overview: single column on mobile */
      .overview-grid {
        grid-template-columns: 1fr;
      }

      /* Summary: 2 columns on mobile (down from 4) */
      .summary-grid {
        grid-template-columns: 1fr 1fr;
      }

      /* GPU row: wrap on mobile */
      .gpu-row { flex-wrap: wrap; }
      .gpu-name { width: auto; flex: 1; }

      /* Results table: scroll horizontally */
      .results-table-wrap { overflow-x: auto; }

      /* Modal: full width on mobile */
      #modal {
        width: calc(100vw - 32px);
        max-height: 80vh;
      }

      /* Sidebar project list: fixed height on mobile */
      #project-list { height: auto; max-height: 120px; }
      #phase-group-list { height: auto; max-height: 120px; }

      /* Run desc: allow wrapping on mobile */
      .run-desc { white-space: normal; max-width: 100%; }
    }

    @media (max-width: 480px) {
      .summary-grid { grid-template-columns: 1fr 1fr; }
      #topbar { padding: 0 12px; }
      .topbar-actions { gap: 6px; }
      .text-muted { display: none; }
    }
  </style>
</head>
<body>
  <aside id="sidebar">
    <div class="sidebar-header">
      <span class="logo">⚗ Research</span>
      <span id="sse-dot" title="Live updates: connecting..."></span>
    </div>
    <!-- Global shared tab (no project needed) -->
    <nav id="nav-global" style="border-bottom:1px solid var(--border);padding-bottom:4px;margin-bottom:4px">
      <a class="nav-link" data-view="gpus"><span class="nav-icon">🖥</span>GPUs</a>
    </nav>
    <!-- Project list (always visible, click to switch) -->
    <div class="project-label" style="padding:8px 16px 4px;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--text-dim)">PROJECTS</div>
    <div id="project-list" style="overflow-y:auto;height:100px;min-height:24px;flex-shrink:0"></div>
    <div class="sb-resize" id="sb-resize-1"></div>
    <!-- Phase progress for selected project -->
    <div id="phase-section" style="display:none;flex-shrink:0">
      <div class="project-label" style="padding:6px 16px 2px;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--text-dim)">PROGRESS</div>
      <div id="phase-headline"></div>
      <div class="phase-prog-track"><div class="phase-prog-fill" id="phase-prog-fill" style="width:0%"></div></div>
      <div id="phase-group-list" style="height:140px;overflow-y:auto"></div>
      <div class="sb-resize" id="sb-resize-2"></div>
    </div>
    <!-- Per-project phase tabs (populated by app.js PHASE_GROUPS) -->
    <nav id="nav" style="border-top:1px solid var(--border);padding-top:4px">
      <a class="nav-link" data-view="phase-setup"><span class="nav-icon">⚙</span>Setup</a>
      <a class="nav-link" data-view="phase-ideation"><span class="nav-icon">💡</span>Ideation</a>
      <a class="nav-link" data-view="phase-pilot"><span class="nav-icon">🔬</span>Pilot</a>
      <a class="nav-link" data-view="phase-experiments"><span class="nav-icon">⚗</span>Experiments</a>
      <a class="nav-link" data-view="phase-analysis"><span class="nav-icon">📊</span>Analysis</a>
      <a class="nav-link" data-view="phase-writing"><span class="nav-icon">✍</span>Writing</a>
      <a class="nav-link" data-view="phase-rebuttal"><span class="nav-icon">📬</span>Rebuttal</a>
    </nav>
    <div id="sidebar-stats" style="display:none">
      <div class="stat-chip"><span class="stat-val running" id="stat-running">0</span><span class="stat-lbl">Running</span></div>
      <div class="stat-chip"><span class="stat-val done" id="stat-done">0</span><span class="stat-lbl">Done</span></div>
      <div class="stat-chip"><span class="stat-val pending" id="stat-pending">0</span><span class="stat-lbl">Queued</span></div>
      <div class="stat-chip"><span class="stat-val" style="color:var(--purple);font-size:14px" id="stat-phase">—</span><span class="stat-lbl">Phase</span></div>
    </div>
  </aside>

  <main id="main">
    <header id="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button id="menu-toggle" title="Toggle sidebar">☰</button>
        <div id="breadcrumb">Research Dashboard</div>
      </div>
      <div class="topbar-actions">
        <span class="text-muted" id="last-updated"></span>
        <button id="theme-toggle" title="切换主题">🌙</button>
        <button id="refresh-btn" title="Refresh">↻</button>
      </div>
    </header>
    <div id="view-container"><div class="loading">Loading…</div></div>
  </main>


  <script type="module" src="/frontend/app.js"></script>
</body>
</html>
